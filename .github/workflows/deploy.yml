name: Deploy Publisher

on:
  push:
    branches: [main]

env:
  GCP_PROJECT: project-30a4caa9-f885-4066-a8c
  GCP_REGION: europe-southwest1
  REGISTRY: europe-southwest1-docker.pkg.dev/project-30a4caa9-f885-4066-a8c/fynder

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/521478932262/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions-sa@project-30a4caa9-f885-4066-a8c.iam.gserviceaccount.com'
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: europe-southwest1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push publisher image
        run: |
          docker build -t ${{ env.REGISTRY }}/publisher:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/publisher:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/publisher:${{ github.sha }} ${{ env.REGISTRY }}/publisher:latest
          docker push ${{ env.REGISTRY }}/publisher:latest

      - name: Update Cloud Run publisher job
        run: |
          gcloud run jobs update swalla-publisher \
            --image=${{ env.REGISTRY }}/publisher:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT }}
